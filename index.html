<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <!-- Этот тег критически важен для мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPART | Prémiový zahradní design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: #1a1a1a; background: #fafafa; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 15px; }
        
        header { padding: 15px 0; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo-wrap { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 20px; font-weight: 700; } .logo span { color: #b71c1c; }
        .phone-header { font-size: 14px; font-weight: 600; white-space: nowrap; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 15px; font-size: 14px; font-weight: 500; }
        
        .hero { height: 300px; background: url('photo1.jpg') center/cover no-repeat; width: 100%; }

        .why-section { padding: 50px 0; }
        .why-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; }
        @media (min-width: 768px) { .why-grid { grid-template-columns: repeat(3, 1fr); } }
        .why-item { padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fff; text-align: center; }
        
        .product-list { display: flex; flex-direction: column; gap: 30px; margin-bottom: 50px; }
        .product-item { background: #fff; display: flex; flex-direction: column; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        @media (min-width: 768px) { .product-item { flex-direction: row; } }
        
        .product-img-box { position: relative; width: 100%; height: 250px; overflow: hidden; background: #eee; }
        @media (min-width: 768px) { .product-img-box { width: 50%; height: 350px; } }
        
        .slider-track { display: flex; width: 200%; height: 100%; transition: 0.5s; }
        .slider-track img { width: 50%; height: 100%; object-fit: cover; }
        .product-info { padding: 25px; width: 100%; }
        
        .btn-cart { background: #1a1a1a; color: #fff; padding: 15px; border: none; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 15px; font-weight: 600; }
        
        .order-section { padding: 50px 0; background: #fff; }
        .form-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo-wrap">
                <div class="logo">KO<span>PART</span></div>
                <div class="phone-header"><i class="fas fa-phone-alt" style="margin-right:5px; color:#b71c1c;"></i>+420 792 580 197</div>
            </div>
            <nav class="nav-links">
                <a href="#why">Proč my?</a>
                <a href="#products">Produkty</a>
            </nav>
        </div>
    </header>

    <section id="home" class="hero"></section>

    <section id="why" class="container">
        <h2 style="text-align:center;">PROČ KOPART?</h2>
        <div class="why-grid">
            <div class="why-item"><i class="fas fa-tree"></i><h3>MASIVNÍ DŘEVO</h3></div>
            <div class="why-item"><i class="fas fa-shield-alt"></i><h3>OCHRANA</h3></div>
            <div class="why-item"><i class="fas fa-truck"></i><h3>DOPRAVA ZDARMA</h3></div>
        </div>
    </section>

    <section id="products" class="container">
        <h2 style="text-align:center;">Produkty</h2>
        <div class="product-list" id="prod-list"></div>
    </section>

    <section id="contact" class="order-section">
        <div class="container">
            <div class="form-container">
                <h3 style="text-align:center;">Nezávazná poptávka</h3>
                <form id="tg-form">
                    <input type="text" id="name" placeholder="Vaše jméno" required>
                    <input type="tel" id="phone" placeholder="Váš telefon" required>
                    <textarea id="msg" placeholder="Zde se zobrazí váš výběr..." rows="3" required></textarea>
                    <button type="submit" class="btn-cart">Odeslat</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        const products = [
            { id: 's1', name: 'Lavečka Slim', price: 4290, old: 5100, img1: 'photo2.png', img2: 'photo15.jpg' },
            { id: 's2', name: 'Lavečka Classic', price: 5890, old: 6900, img1: 'photo21.jpg', img2: 'photo22.jpg' },
            { id: 's3', name: 'Půlkruhová lavice', price: 41690, old: 49000, img1: 'photo3.webp', img2: 'photo3.webp' }
        ];

        const list = document.getElementById('prod-list');
        products.forEach(p => {
            list.innerHTML += `
                <div class="product-item">
                    <div class="product-img-box">
                        <div class="slider-track" id="${p.id}"><img src="${p.img1}"><img src="${p.img2}"></div>
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div style="margin: 10px 0;">
                            <span style="text-decoration:line-through; color:#888;">${p.old} Kč</span>
                            <span style="font-weight:700; color:#b71c1c; display:block; font-size:20px;">${p.price} Kč</span>
                        </div>
                        <button class="btn-cart" onclick="addToCart('${p.name}')">Přidat do objednávky</button>
                    </div>
                </div>
            `;
        });

        let cart = [];
        function addToCart(name) {
            cart.push(name);
            document.getElementById('msg').value = "Mám zájem o: " + cart.join(", ");
            alert(name + " přidáno!");
        }
    </script>
</body>
</html>
