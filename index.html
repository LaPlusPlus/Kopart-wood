<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPART | Prémiový zahradní design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: #1a1a1a; background: #fafafa; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        header { padding: 20px 0; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo-wrap { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 700; } .logo span { color: #b71c1c; }
        .phone-header { font-weight: 600; color: #1a1a1a; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 25px; font-weight: 500; }
        
        .hero { height: 500px; background: url('photo1.jpg') center/cover no-repeat; width: 100%; }

        .why-section { padding: 80px 0; text-align: center; }
        .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
        .why-item { padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fff; }
        
        .product-list { display: grid; grid-template-columns: 1fr; margin-bottom: 80px; }
        .product-item { background: #fff; display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #eee; align-items: center; }
        .product-img-box { position: relative; height: 350px; overflow: hidden; background: #eee; }
        .slider-track { display: flex; width: 200%; height: 100%; transition: 0.5s; }
        .slider-track img { width: 50%; height: 100%; object-fit: cover; }
        .product-info { padding: 40px; }
        .old-price { text-decoration: line-through; color: #888; font-size: 16px; margin-right: 10px; }
        .new-price { font-size: 24px; font-weight: 700; color: #b71c1c; display: block; margin-top: 5px; }
        
        /* Стилизация формы */
        .order-section { background: #fff; padding: 60px 0; border-top: 5px solid #1a1a1a; }
        .form-container { max-width: 600px; margin: 0 auto; background: #fdfdfd; padding: 40px; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-cart { background: #b71c1c; color: #fff; padding: 18px; border: none; cursor: pointer; border-radius: 6px; font-weight: 700; width: 100%; margin-top: 10px; }
        
        .details-drawer { max-height: 0; overflow: hidden; transition: 0.4s; color: #666; font-size: 14px; margin-bottom: 15px; }
        .btn-more { background: none; border: none; color: #b71c1c; cursor: pointer; margin-bottom: 10px; font-weight: 600; text-align: left; display: block; }
        
        footer { text-align: center; padding: 40px 0; background: #eee; }
        .social-links { margin-bottom: 20px; }
        .social-links a { font-size: 24px; color: #1a1a1a; margin: 0 15px; }
    </style>
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo-wrap">
                <div class="logo">KO<span>PART</span></div>
                <div class="phone-header"><i class="fas fa-phone-alt" style="margin-right:8px; color:#b71c1c;"></i>+420 792 580 197</div>
            </div>
            <nav class="nav-links">
                <a href="#why">Proč my?</a>
                <a href="#products">Produkty</a>
                <a href="#contact" style="color:#b71c1c;">Kontakt</a>
            </nav>
        </div>
    </header>

    <section id="home" class="hero"></section>

    <section id="why" class="why-section container">
        <h2>PROČ LAVIČKY OD KOPART?</h2>
        <div class="why-grid">
            <div class="why-item"><i class="fas fa-tree"></i><h3>MASIVNÍ DŘEVO</h3><p>Kvalitní a vysušené.</p></div>
            <div class="why-item"><i class="fas fa-shield-alt"></i><h3>OCHRANA</h3><p>Lakování a zinkování.</p></div>
            <div class="why-item"><i class="fas fa-truck"></i><h3>DOPRAVA</h3><p>ZDARMA po celé ČR.</p></div>
        </div>
    </section>

    <section id="products" class="container">
        <h2 style="text-align:center;">Naše produkty</h2>
        <div class="product-list" id="prod-list"></div>
    </section>

    <section id="contact" class="order-section">
        <div class="container">
            <div class="form-container">
                <h2 style="text-align:center; margin-top:0;">Nezávazná poptávka</h2>
                <form id="tg-form">
                    <input type="text" id="name" placeholder="Vaše jméno" required>
                    <input type="email" id="email" placeholder="Váš e-mail" required>
                    <input type="tel" id="phone" placeholder="Váš telefon" required>
                    <textarea id="msg" placeholder="Zde se zobrazí váš výběr..." rows="4" required></textarea>
                    <button type="submit" class="btn-cart">Odeslat objednávku</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="https://www.facebook.com/share/14isyAzjVZu/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/kopart.sro?igsh=MWticGJydjN1cWNqeg=="><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@kopart.sro?_r=1&_t=ZN-97rUZeTahOg"><i class="fab fa-tiktok"></i></a>
            </div>
            <strong>KOPART s.r.o.</strong> | Tel: +420 792 580 197<br>
            <p>&copy; 2026 KOPART</p>
        </div>
    </footer>

    <script>
        const products = [
            { id: 's1', name: 'Lavečka Slim', price: 4290, old: 5100, img1: 'photo2.png', img2: 'photo15.jpg', desc: 'Elegantní a minimalistická lavička.', specs: ['Materiál: ocel, dubové dřevo', 'Barva: antracit, dub', 'Hmotnost: 90 – 110 kg', 'Nosnost na místo: 150 kg', 'Rozměry: 1200x250x400 mm', 'Spojení: nerezové vruty'] },
            { id: 's2', name: 'Lavečka Classic', price: 5890, old: 6900, img1: 'photo21.jpg', img2: 'photo22.jpg', desc: 'Ověřený design pro každou zahradu.', specs: ['Materiál: ocel, dubové dřevo', 'Barva: antracit, dub', 'Hmotnost: 90 – 110 kg', 'Nosnost na místo: 150 kg', 'Rozměry: 1200x250x400 mm', 'Spojení: nerezové vruty'] },
            { id: 's3', name: 'Půlkruhová lavice', price: 41690, old: 49000, img1: 'photo3.webp', img2: 'photo3.webp', desc: 'Dominanta zahrady pro kruhové posezení.', specs: ['Průměr: 320 cm', 'Dubový masiv síla: 3,6 cm', 'Výška sezení: 44 cm', 'Profil nohou: 40x40 mm', 'Povrch: komaxit (možno zinek/nerez)', 'Spojení: nerezová ocel'] },
            { id: 's4', name: 'Stojan na síť', price: 2190, old: 2600, img1: 'photo4.webp', img2: 'photo5.webp', desc: 'Praktický dřevěný stojan pro relaxaci.', specs: ['Nosnost: 150 kg', 'Rychlá montáž bez nářadí', 'Pevné ocelové profily', 'Hladký povrch dřeva', 'Vysoká stabilita a odolnost'] },
            { id: 's5', name: 'Designer lavice', price: 31390, old: 36900, img1: 'photo6.webp', img2: 'photo7.webp', desc: 'Designová lavice s masivní ocelovou podnoží.', specs: ['Síla dubu: 3,6 cm', 'Rozměr: 250x43x44 cm (v. 90 cm)', 'Podnož: ocel 100x12 mm', 'Povrch: olej / RAL 9005', 'Zakázková výroba rozměrů'] }
        ];

        const list = document.getElementById('prod-list');
        products.forEach(p => {
            list.innerHTML += `
                <div class="product-item">
                    <div class="product-img-box">
                        <div class="slider-track" id="${p.id}"><img src="${p.img1}"><img src="${p.img2}"></div>
                        <button style="position:absolute; top:50%; left:10px; border:none; background:rgba(255,255,255,0.7); padding:10px; cursor:pointer;" onclick="move('${p.id}',0)"><i class="fas fa-chevron-left"></i></button>
                        <button style="position:absolute; top:50%; right:10px; border:none; background:rgba(255,255,255,0.7); padding:10px; cursor:pointer;" onclick="move('${p.id}',1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="product-info">
                        <h2>${p.name}</h2>
                        <div>
                            <span class="old-price">${p.old.toLocaleString()} Kč</span>
                            <span class="new-price">${p.price.toLocaleString()} Kč</span>
                        </div>
                        <button class="btn-more" onclick="this.nextElementSibling.style.maxHeight = this.nextElementSibling.style.maxHeight ? null : '200px'">Více informací ▾</button>
                        <div class="details-drawer">
                            <p>${p.desc}</p>
                            <ul>${p.specs.map(s => `<li>${s}</li>`).join('')}</ul>
                        </div>
                        <button class="btn-cart" onclick="addToCart('${p.name}', ${p.price})" style="background:#1a1a1a;">Přidat do objednávky</button>
                    </div>
                </div>
            `;
        });

        function move(id, dir) { document.getElementById(id).style.transform = dir ? 'translateX(-50%)' : 'translateX(0)'; }
        
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('msg').value = "Objednávka: " + cart.map(i => i.name).join(", ");
            alert(name + " přidáno do objednávky!");
        }
        document.getElementById('tg-form').onsubmit = (e) => {
            e.preventDefault();
            alert("Objednávka byla odeslána.");
            document.getElementById('tg-form').reset();
            cart = [];
        }
    </script>
</body>
</html>
